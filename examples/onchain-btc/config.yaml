listen_addr: ":8092"

# db_path: /data/paywall.db  # uncomment to persist anti-replay tokens across restarts

bitcoind:
  host: "bitcoind:18443"
  rpc_user: "bitcoin"
  rpc_password: "bitcoin"
  # min_confirmations: 0  # 0 = accept mempool (default); set to 1+ for confirmed-only

routes:
  - path_prefix: "/get"
    upstream: "http://upstream:80"
    price_sats: 1000
  - path_prefix: "/post"
    upstream: "http://upstream:80"
    price_sats: 5000
