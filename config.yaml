listen_addr: ":8080"

# Optional: persist spent tokens to SQLite so anti-replay survives restarts.
# Omit (or leave empty) to use an in-memory store (state lost on restart).
# db_path: /data/paywall.db

# Optional: rate-limit unauthenticated (challenge) requests per source IP.
# Uses a token bucket: sustained rate of requests_per_second with short
# bursts up to burst. Omit this section to disable rate limiting.
#
# rate_limit:
#   requests_per_second: 5
#   burst: 10

lnd:
  host: "lnd-server:10009"
  tls_cert_path: "/lnd/tls.cert"
  macaroon_path: "/lnd/data/chain/bitcoin/regtest/admin.macaroon"

routes:
  - path_prefix: "/get"
    upstream: "http://upstream:80"
    price_sats: 10

  - path_prefix: "/post"
    upstream: "http://upstream:80"
    price_sats: 50

  - path_prefix: "/anything"
    upstream: "http://upstream:80"
    price_sats: 10
