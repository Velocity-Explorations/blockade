services:

  bitcoind:
    image: bitcoin/bitcoin:27.1
    command:
      - bitcoind
      - -conf=/bitcoin.conf
      - -datadir=/data
      - -regtest
    volumes:
      - ./docker/bitcoin/bitcoin.conf:/bitcoin.conf:ro
      - bitcoind-data:/data
    ports:
      - "18443:18443"   # RPC (for host-side bitcoin-cli)
    networks:
      - paywall
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=bitcoin", "-rpcpassword=bitcoin", "getblockchaininfo"]
      interval: 5s
      timeout: 5s
      retries: 20

  lnd-server:
    image: lightninglabs/lnd:v0.18.4-beta
    command:
      - lnd
      - --noseedbackup
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=bitcoin
      - --bitcoind.rpcpass=bitcoin
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --listen=0.0.0.0:9735
      - --tlsextradomain=lnd-server
      - --accept-keysend
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "10009:10009"   # gRPC (for host-side lncli)
      - "8081:8080"     # REST (8081 to avoid conflict with proxy on 8080)
    volumes:
      - lnd-server-data:/root/.lnd
    networks:
      - paywall

  lnd-client:
    image: lightninglabs/lnd:v0.18.4-beta
    command:
      - lnd
      - --noseedbackup
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=bitcoin
      - --bitcoind.rpcpass=bitcoin
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --listen=0.0.0.0:9736
      - --tlsextradomain=lnd-client
      - --accept-keysend
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "10010:10009"   # gRPC (different host port)
      - "8082:8080"     # REST
    volumes:
      - lnd-client-data:/root/.lnd
    networks:
      - paywall

  upstream:
    image: kennethreitz/httpbin
    networks:
      - paywall

  proxy:
    build: .
    command: ["-config", "/config/config.yaml"]
    depends_on:
      - lnd-server
      - upstream
    ports:
      - "8080:8080"
    volumes:
      - lnd-server-data:/lnd:ro   # proxy reads TLS cert + macaroon from lnd-server's data dir
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - paywall

  # ----------------------------------------------------------------------
  # Second POC: Keycloak login paywall (see examples/keycloak-login/).
  # All three services below are gated by `profiles: [keycloak]`, so they
  # are NOT started by `make up`. Use `make up-keycloak` instead.
  # ----------------------------------------------------------------------

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [keycloak, onchain-keycloak]
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./examples/keycloak-login/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8091:8080"   # direct introspection (e.g. /userinfo, /.well-known/openid-configuration)
    healthcheck:
      # Keycloak's UBI image has no curl/wget; bash /dev/tcp confirms the listener is up.
      # Realm import readiness is verified separately by the e2e script.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s
    networks:
      - paywall

  keycloak-paywall:
    build: .
    profiles: [keycloak]
    command: ["-config", "/config/keycloak.yaml"]
    depends_on:
      lnd-server:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8090:8090"
    volumes:
      - lnd-server-data:/lnd:ro
      - ./examples/keycloak-login/config.yaml:/config/keycloak.yaml:ro
    networks:
      - paywall

  # ----------------------------------------------------------------------
  # Third POC: on-chain BTC paywall (see examples/onchain-btc/).
  # Gated by `profiles: [onchain]`; use `make up-onchain` to start.
  # Does NOT require lnd — the proxy talks directly to bitcoind via JSON-RPC.
  # ----------------------------------------------------------------------

  onchain-paywall:
    build: .
    profiles: [onchain]
    command: ["-config", "/config/onchain.yaml"]
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "8092:8092"
    volumes:
      - ./examples/onchain-btc/config.yaml:/config/onchain.yaml:ro
      - onchain-paywall-data:/data
    networks:
      - paywall

  # ----------------------------------------------------------------------
  # Fourth POC: on-chain BTC + Keycloak (see examples/onchain-keycloak/).
  # Gated by `profiles: [onchain-keycloak]`; use `make up-onchain-keycloak`.
  # Requires no lnd — pays via bitcoind "tester" wallet.
  # ----------------------------------------------------------------------

  onchain-keycloak-paywall:
    build: .
    profiles: [onchain-keycloak]
    command: ["-config", "/config/onchain-keycloak.yaml"]
    depends_on:
      bitcoind:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8093:8093"
    volumes:
      - ./examples/onchain-keycloak/config.yaml:/config/onchain-keycloak.yaml:ro
      - onchain-keycloak-paywall-data:/data
    networks:
      - paywall

  # ----------------------------------------------------------------------
  # Browser demo: nginx serving the interactive paywall demo UI.
  # Gated by `profiles: [demo]`; use `make up-demo` to start.
  # Works with any running POC — toggle between Lightning and on-chain
  # in the browser. Requires CORS headers on the proxy (already enabled).
  # ----------------------------------------------------------------------

  demo:
    image: nginx:alpine
    profiles: [demo]
    volumes:
      - ./examples/browser-demo/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "8084:80"

volumes:
  bitcoind-data:
  lnd-server-data:
  lnd-client-data:
  onchain-paywall-data:
  onchain-keycloak-paywall-data:

networks:
  paywall:
    driver: bridge
